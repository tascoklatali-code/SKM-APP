<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IKM - Survei Kepuasan Masyarakat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans antialiased">

    <header class="bg-blue-600 text-white shadow-md py-6 px-4 mb-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">DASHBOARD REAL-TIME IKM</h1>
                <p class="text-blue-100 text-sm mt-1">Berdasarkan Permenpan RB Nomor 14 Tahun 2017</p>
            </div>
            <a href="index.html" class="bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold py-2 px-4 rounded-lg shadow transition">
                &larr; Kembali ke Kuesioner
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-12">
        <div id="loadingStatus" class="bg-white p-8 rounded-xl shadow-sm text-center font-medium text-slate-600">
            <span class="inline-block animate-spin rounded-full h-6 w-6 border-2 border-blue-600 border-t-transparent mr-3 align-middle"></span>
            Memuat dan mengalkulasi data dari Google Sheets...
        </div>

        <div id="dashboardContent" class="hidden space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="bg-white rounded-xl shadow-sm border-l-4 flex items-center p-4" style="border-left-color: #ff5050;">
                    <div class="pr-4 flex items-center justify-center text-[#ff5050]">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
                        </svg>
                    </div>
                    <div class="border-r border-gray-200 h-12"></div>
                    <div class="pl-4">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Responden</p>
                        <p id="totalResponden" class="text-3xl font-extrabold mt-0.5" style="color: #ff5050;">0</p>
                    </div>
                </div>

                <div id="cardIKM" class="bg-white rounded-xl shadow-sm border-l-4 flex items-center p-4 border-blue-600">
                    <div id="iconIKM" class="pr-4 flex items-center justify-center text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
                        </svg>
                    </div>
                    <div class="border-r border-gray-200 h-12"></div>
                    <div class="pl-4">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Nilai Akhir IKM</p>
                        <p id="nilaiIKM" class="text-3xl font-extrabold text-blue-600 mt-0.5">0.00</p>
                    </div>
                </div>

                <div id="cardMutu" class="bg-white rounded-xl shadow-sm border-l-4 flex items-center p-4 border-emerald-500">
                    <div id="iconMutu" class="pr-4 flex items-center justify-center text-emerald-600">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.504-1.125-1.125-1.125h-2.25a1.125 1.125 0 0 0-1.125 1.125V18.75m9 0V16.5L12 3 4.5 16.5v2.25m7-10.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z" />
                        </svg>
                    </div>
                    <div class="border-r border-gray-200 h-12"></div>
                    <div class="pl-4">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Mutu Pelayanan</p>
                        <p id="mutuPelayanan" class="text-2xl font-extrabold text-emerald-600 mt-0.5">-</p>
                    </div>
                </div>

            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold text-slate-800 mb-4">Grafik Nilai Rata-Rata (NRR) Per Unsur Pelayanan</h2>
                <div class="relative w-full h-[350px]">
                    <canvas id="ikmChart"></canvas>
                </div>
            </div>

        </div>
    </main>

    <script>
        // PENTING: Ganti URL di bawah ini dengan Web App URL Google Apps Script Anda yang aktif!
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyt0tpkG6wPyipuBPGQW5ODnFUnXwB6aanKhErn3d95cmPJ8yzfYkhGhMu96snokce7VQ/exec";

        document.addEventListener("DOMContentLoaded", function() {
            // Mengambil data dari Google Apps Script melalui doGet
            fetch(WEB_APP_URL)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        // 1. Update ringkasan nilai teks di card dashboard
                        document.getElementById("totalResponden").innerText = data.total_responden;
                        document.getElementById("nilaiIKM").innerText = data.nilai_ikm.toFixed(2);
                        document.getElementById("mutuPelayanan").innerText = data.mutu_pelayanan;

                        // Tentukan warna garis tepi dan warna ikon mutu pelayanan secara dinamis
                        const cardMutu = document.getElementById("cardMutu");
                        const iconMutu = document.getElementById("iconMutu");
                        const mutuEl = document.getElementById("mutuPelayanan");

                        if (data.mutu_pelayanan.includes("A")) {
                            cardMutu.className = "bg-white rounded-xl shadow-sm border-l-4 flex items-center p-4 border-emerald-500";
                            iconMutu.className = "pr-4 flex items-center justify-center text-emerald-600";
                            mutuEl.className = "text-2xl font-extrabold text-emerald-600 mt-0.5";
                        } else if (data.mutu_pelayanan.includes("B")) {
                            cardMutu.className = "bg-white rounded-xl shadow-sm border-l-4 flex items-center p-4 border-blue-500";
                            iconMutu.className = "pr-4 flex items-center justify-center text-blue-500";
                            mutuEl.className = "text-2xl font-extrabold text-blue-500 mt-0.5";
                        } else if (data.mutu_pelayanan.includes("C")) {
                            cardMutu.className = "bg-white rounded-xl shadow-sm border-l-4 flex items-center p-4 border-amber-500";
                            iconMutu.className = "pr-4 flex items-center justify-center text-amber-500";
                            mutuEl.className = "text-2xl font-extrabold text-amber-500 mt-0.5";
                        } else {
                            cardMutu.className = "bg-white rounded-xl shadow-sm border-l-4 flex items-center p-4 border-red-500";
                            iconMutu.className = "pr-4 flex items-center justify-center text-red-500";
                            mutuEl.className = "text-2xl font-extrabold text-red-500 mt-0.5";
                        }

                        // 2. Buat Grafik Batang Chart.js
                        const ctx = document.getElementById('ikmChart').getContext('2d');
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: ['U1', 'U2', 'U3', 'U4', 'U5', 'U6', 'U7', 'U8', 'U9'],
                                datasets: [{
                                    label: 'Nilai Rata-Rata Unsur',
                                    data: data.nrr_unsur,
                                    backgroundColor: 'rgba(37, 99, 235, 0.2)',
                                    borderColor: 'rgba(37, 99, 235, 1)',
                                    borderWidth: 2,
                                    borderRadius: 6,
                                    barThickness: 30
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        max: 4, // Skala nilai kuesioner maksimal 4
                                        ticks: { stepSize: 1 }
                                    }
                                },
                                plugins: {
                                    legend: { display: false }
                                }
                            }
                        });

                        // Tukar tampilan dari loading ke konten dashboard
                        document.getElementById("loadingStatus").classList.add("hidden");
                        document.getElementById("dashboardContent").classList.remove("hidden");
                    } else {
                        document.getElementById("loadingStatus").innerText = "Gagal memuat data kalkulasi.";
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("loadingStatus").innerText = "Terjadi kesalahan koneksi saat mengambil data.";
                });
        });
    </script>
</body>
</html>
